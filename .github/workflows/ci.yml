name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r analysis/requirements.txt pytest ruff

      - name: TypeScript lint
        run: npm run lint

      - name: TypeScript tests + coverage
        run: npm run test:cov

      - name: Save coverage summary
        run: cp coverage/coverage-summary.json coverage-summary.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.json

      - name: Python tests
        run: python -m pytest

      - name: Inference API tests
        run: python -m pytest analysis/tests/test_inference_api.py

      - name: Python lint (Ruff)
        run: ruff check analysis

      - name: Python type check (Pyright)
        run: npx pyright

      - name: Next.js build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    env:
      DATABASE_URL: file:./prisma/dev.db
      NEXTAUTH_SECRET: ci-secret-key
      NEXTAUTH_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
