name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib pytest ruff

      - name: TypeScript lint
        run: npm run lint

      - name: TypeScript tests
        run: npm run test

      - name: Python tests
        run: python -m pytest

      - name: Python lint (Ruff)
        run: ruff check analysis

      - name: Python type check (Pyright)
        run: npx pyright

      - name: Next.js build
        run: npm run build
