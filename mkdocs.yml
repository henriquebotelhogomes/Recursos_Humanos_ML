site_name: PeopleRisk — Documentação
site_description: People Analytics com Machine Learning para previsão de attrition.
site_author: PeopleRisk
docs_dir: docs
site_dir: site
dev_addr: "127.0.0.1:8765"

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Tema claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Início: index.md
  - Como começar: getting-started.md
  - Arquitetura: architecture.md
  - Pipeline de ML: ml-pipeline.md
  - Model card: risk-model.md
  - Fluxo de dados: data-pipeline.md
  - API: api.md
  - Contribuindo: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
